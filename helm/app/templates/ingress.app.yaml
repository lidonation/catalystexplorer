{{- if eq .Values.services.app.environment "production" -}}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: "{{ $.Chart.Name }}-redirect-to-www"
  namespace: {{ .Values.namespace }}
spec:
  redirectRegex:
    regex: "^https?://catalystexplorer\\.com/(.*)"
    replacement: "https://www.catalystexplorer.com/${1}"
    permanent: true
---
# HTTP IngressRoute for naked domain (redirect to www)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: "{{ $.Chart.Name }}-naked-http-redirect"
  namespace: {{ .Values.namespace }}
  labels:
    app: "{{ $.Chart.Name }}"
    chart: "{{ $.Chart.Name }}-{{ $.Chart.Version }}"
    release: "{{ $.Release.Name }}"
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`catalystexplorer.com`)
      kind: Rule
      priority: 10
      middlewares:
        - name: "{{ $.Chart.Name }}-redirect-to-www"
          namespace: {{ .Values.namespace }}
      services:
        - name: "{{ $.Chart.Name }}-app-service"
          namespace: {{ .Values.namespace }}
          port: 8000
---
# HTTP IngressRoute for www subdomain (redirect to HTTPS)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: "{{ $.Chart.Name }}-www-http"
  namespace: {{ .Values.namespace }}
  labels:
    app: "{{ $.Chart.Name }}"
    chart: "{{ $.Chart.Name }}-{{ $.Chart.Version }}"
    release: "{{ $.Release.Name }}"
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`www.catalystexplorer.com`)
      kind: Rule
      priority: 5
      middlewares:
        - name: traefik-redirect-http-to-https@kubernetescrd
          namespace: traefik
      services:
        - name: "{{ $.Chart.Name }}-app-service"
          namespace: {{ .Values.namespace }}
          port: 8000
---
# HTTPS IngressRoute for naked domain (redirect to www)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: "{{ $.Chart.Name }}-naked-https-redirect"
  namespace: {{ .Values.namespace }}
  labels:
    app: "{{ $.Chart.Name }}"
    chart: "{{ $.Chart.Name }}-{{ $.Chart.Version }}"
    release: "{{ $.Release.Name }}"
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`catalystexplorer.com`)
      kind: Rule
      priority: 10
      middlewares:
        - name: "{{ $.Chart.Name }}-redirect-to-www"
          namespace: {{ .Values.namespace }}
      services:
        - name: "{{ $.Chart.Name }}-app-service"
          namespace: {{ .Values.namespace }}
          port: 8000
  tls:
    secretName: naked-catalystexplorer-ssl
---
# HTTPS IngressRoute for www subdomain
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: "{{ $.Chart.Name }}-www-https"
  namespace: {{ .Values.namespace }}
  labels:
    app: "{{ $.Chart.Name }}"
    chart: "{{ $.Chart.Name }}-{{ $.Chart.Version }}"
    release: "{{ $.Release.Name }}"
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  entryPoints:
    - websecure
    - websecure-udp
  tls:
    secretName: wildcard-catalystexplorer-ssl
  routes:
    - match: Host(`www.catalystexplorer.com`)
      kind: Rule
      priority: 5
      middlewares:
        - name: traefik-default-headers@kubernetescrd
          namespace: traefik
        - name: traefik-traefik-http3-headers@kubernetescrd
          namespace: traefik
      services:
        - name: "{{ $.Chart.Name }}-app-service"
          namespace: {{ .Values.namespace }}
          port: 8000
{{- end -}}
{{- if eq .Values.services.app.environment "preview" -}}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: "{{ $.Chart.Name }}-ingress-route"
  namespace: {{ .Values.namespace }}
  labels:
    app: "{{ $.Chart.Name }}"
    chart: "{{ $.Chart.Name }}-{{ $.Chart.Version }}"
    release: "{{ $.Release.Name }}"
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  entryPoints:
    - web
    - websecure
    - websecure-udp
  tls:
    secretName: wildcard-catalystexplorer-ssl
  routes:
    - match: Host(`preview.catalystexplorer.com`)
      kind: Rule
      priority: 10
      middlewares:
        - name: traefik-redirect-http-to-https@kubernetescrd
          namespace: traefik
        - name: traefik-default-headers@kubernetescrd
          namespace: traefik
        - name: traefik-traefik-http3-headers@kubernetescrd
          namespace: traefik
      services:
        - name: "{{ $.Chart.Name }}-app-service"
          namespace: {{ .Values.namespace }}
          passHostHeader: true
          port: 8000
{{- end -}}